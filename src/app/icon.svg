<!-- src/app/icon.svg -->
<!-- Circular Algeria flag favicon -->
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 32 32" width="32" height="32">
  <defs>
    <clipPath id="circle">
      <circle cx="16" cy="16" r="16"/>
    </clipPath>
  </defs>
  <g clip-path="url(#circle)">
    <rect width="16" height="32" fill="#006233"/>
    <rect x="16" width="16" height="32" fill="#ffffff"/>

    <!-- Crescent: red circle with offset white circle cut out (evenodd) -->
    <path fill-rule="evenodd" fill="#d21034"
      d="M16,9 A7,7 0 1,0 16,23 A7,7 0 1,0 16,9 Z
         M17.7,10.2 A5.8,5.8 0 1,1 17.7,21.8 A5.8,5.8 0 1,1 17.7,10.2 Z"/>

    <!-- 5-pointed star, centered in crescent opening -->
    <path fill="#d21034" d="M19,14 L19.447,15.385 L20.902,15.382 L19.723,16.235 L20.176,17.618 L19,16.76 L17.824,17.618 L18.277,16.235 L17.098,15.382 L18.553,15.385 Z"/>
  </g>
</svg>

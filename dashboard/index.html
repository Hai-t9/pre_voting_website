<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>لوحة التحكم | كحال امنة</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link href="https://fonts.googleapis.com/css2?family=Cairo:wght@400;600;700;900&display=swap" rel="stylesheet" />
  <style>
    body { font-family: 'Cairo', sans-serif; }
  </style>
</head>
<body class="min-h-screen bg-gray-100 flex items-center justify-center">

  <div class="bg-white rounded-2xl shadow-xl p-10 w-full max-w-md">

    <!-- Logo / Header -->
    <div class="text-center mb-8">
      <div class="w-16 h-16 bg-green-700 rounded-full flex items-center justify-center mx-auto mb-4">
        <span class="text-white text-2xl font-black">ك</span>
      </div>
      <h1 class="text-2xl font-black text-gray-800">كحال امنة</h1>
      <p class="text-gray-500 text-sm mt-1">لوحة تحكم الداعمين</p>
    </div>

    <!-- Error message -->
    <div id="errorMsg" class="hidden bg-red-50 border border-red-200 text-red-700 rounded-lg px-4 py-3 text-sm mb-5 text-center">
      كلمة المرور غير صحيحة
    </div>

    <!-- Login form -->
    <form id="loginForm" class="space-y-5">
      <div>
        <label class="block text-sm font-semibold text-gray-700 mb-1">اسم المستخدم</label>
        <input
          id="username"
          type="text"
          placeholder="admin"
          autocomplete="username"
          class="w-full border border-gray-300 rounded-lg px-4 py-2.5 focus:outline-none focus:border-green-600 text-sm"
        />
      </div>
      <div>
        <label class="block text-sm font-semibold text-gray-700 mb-1">كلمة المرور</label>
        <input
          id="password"
          type="password"
          placeholder="••••••••"
          autocomplete="current-password"
          class="w-full border border-gray-300 rounded-lg px-4 py-2.5 focus:outline-none focus:border-green-600 text-sm"
        />
      </div>
      <button
        type="submit"
        class="w-full bg-green-700 hover:bg-green-800 text-white font-bold py-2.5 rounded-lg transition-colors text-sm"
      >
        دخول
      </button>
    </form>

  </div>

  <script>
    // ─── CREDENTIALS ─────────────────────────────────────────────────────────
    // Change these to whatever you want
    const ADMIN_USERNAME = "admin";
    const ADMIN_PASSWORD = "kehal2025";
    // ─────────────────────────────────────────────────────────────────────────

    // If already logged in, go straight to dashboard
    if (sessionStorage.getItem("dashboard_auth") === "true") {
      window.location.href = "dashboard.html";
    }

    document.getElementById("loginForm").addEventListener("submit", function (e) {
      e.preventDefault();
      const user = document.getElementById("username").value.trim();
      const pass = document.getElementById("password").value;

      if (user === ADMIN_USERNAME && pass === ADMIN_PASSWORD) {
        sessionStorage.setItem("dashboard_auth", "true");
        window.location.href = "dashboard.html";
      } else {
        document.getElementById("errorMsg").classList.remove("hidden");
        document.getElementById("password").value = "";
        document.getElementById("password").focus();
      }
    });
  </script>

</body>
</html>
